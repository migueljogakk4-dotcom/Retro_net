<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Undertale Blog</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>UNDERTALE BLOG</h1>
    </header>

    <nav id="menu">
        <div id="heart">❤️</div>

        <div class="opcao">HOME</div>
        <div class="opcao">BLOG</div>
        <div class="opcao">LINKS</div>
        <div class="opcao">PERFIL</div>
        <div class="opcao">SOBRE</div>
    </nav>

    <div id="dialogo-box">
        <p id="dialogo"></p>
    </div>

    <!-- HOME -->
    <section id="home" class="pagina ativa">
        <div class="caixa">
            <h2>Bem-vindo</h2>

            <p>
                * Você entrou no site do Miguel.
            </p>

            <p>
                * Use ← → e ENTER para navegar.
            </p>
        </div>
    </section>

    <!-- BLOG -->
    <section id="blog" class="pagina">

        <div class="caixa">

            <h2>Blog</h2>

            <input
                id="titulo"
                placeholder="Título do post">

            <textarea
                id="texto"
                placeholder="Escreva aqui..."></textarea>

            <button onclick="publicarPost()">
                PUBLICAR
            </button>

        </div>

        <div
            id="posts"
            class="caixa">
        </div>

    </section>

    <!-- LINKS -->
    <section id="links" class="pagina">

        <div class="caixa">

            <h2>Links</h2>

            <p>
                <a
                href="https://discord.gg/N8xzQXeKY"
                target="_blank">
                Discord
                </a>
            </p>

            <p>
                <a
                href="https://youtube.com/@MiguelDoPastel"
                target="_blank">
                YouTube
                </a>
            </p>

        </div>

    </section>

    <!-- PERFIL -->
    <section id="perfil" class="pagina">

        <div class="caixa">

            <h2>Perfil</h2>

            <p>
                Miguel
            </p>

            <p>
                Criador do site.
            </p>

            <p>
                Fã de Undertale.
            </p>

        </div>

    </section>

    <!-- SOBRE -->
    <section id="sobre" class="pagina">

        <div class="caixa">

            <h2>Sobre</h2>

            <p>
                Projeto inspirado em Undertale.
            </p>

            <p>
                Feito em HTML, CSS e JavaScript.
            </p>

        </div>

    </section>

    <script src="script.js"></script>

</body>
</html>
